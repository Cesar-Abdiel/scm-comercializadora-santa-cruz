name: CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Verificar estructura del proyecto
        run: |
          echo "Build ejecutado correctamente"
          ls
          test -f README.md
          test -d src
          test -d docs

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Ejecutar pruebas
        run: |
          echo "Pruebas ejecutadas correctamente"
          python --version

  lint:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Ejecutar lint
        run: |
          echo "Lint ejecutado correctamente"
          echo "Validación de estilo simulada"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Desplegar en staging
        run: |
          echo "Deploy a staging simulado correctamente"
          echo "Ambiente: staging"
